<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<title>Balans tizimi</title>

<style>

<body>

if(amount=="" || amount<=0){

alert("Summani kiriting")

return

}

/* SIZNING KASSA ID */

let kassa_id = "47"

/* Checkout link */

let url = "https://checkout.uz/pay?kassa_id="+kassa_id+"&amount="+amount

/* foydalanuvchini to‘lov sahifasiga yuboradi */

window.location.href = url

}

</script>
