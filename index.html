<!DOCTYPE html>
<html lang="uz">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Balans tizimi</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:400px;
margin:auto;
}

.box{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:12px;
}

input{
width:90%;
padding:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
background:#22c55e;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
margin-top:15px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#16a34a;
}

ul{
text-align:left;
}

</style>

</head>

<body>

<div class="header">
💰 Balans tizimi
</div>

<div class="container">

<div class="box">

<h2>Balans</h2>

<h1 id="balance">0 UZS</h1>

</div>

<div class="box">

<h2>Balansni to‘ldirish</h2>

<input type="number" id="amount" placeholder="Summani kiriting">

<br>

<button onclick="pay()">To‘ldirish</button>

</div>

<div class="box">

<h2>To‘lovlar tarixi</h2>

<ul id="history">

</ul>

</div>

</div>

<script>

/* balans */
let balance = 0

/* tarix */
let history = []

/* balansni yangilash */
function updateBalance(){

document.getElementById("balance").innerText = balance + " UZS"

}

/* tarixni chiqarish */
function updateHistory(){

let list = document.getElementById("history")

list.innerHTML=""

history.forEach(function(item){

let li = document.createElement("li")

li.innerText=item

list.appendChild(li)

})

}

/* to'lov tugmasi */
function pay(){

let amount = document.getElementById("amount").value

if(amount=="" || amount<=0){

alert("Summani kiriting")

return

}

/* bu yerda checkout sahifasiga yuboriladi */

let kassa_id = "47"

/* checkout link */

let payment_url = "https://checkout.uz/pay/"+kassa_id+"?amount="+amount

/* foydalanuvchini to‘lov sahifasiga yuboradi */

window.location.href = payment_url

}

/* demo uchun balans qo‘shish funksiyasi */

function addBalance(amount){

balance += Number(amount)

history.push(amount + " UZS qo‘shildi")

updateBalance()

updateHistory()

}

updateBalance()

</script>

</body>

</html>
