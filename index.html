<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balans sayti</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.box{
background:#1e293b;
width:320px;
margin:20px auto;
padding:20px;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:8px;
width:80%;
margin:10px;
}
</style>

</head>

<body>

<h1>💰 Balans tizimi</h1>

<div class="box">
<h2>Balans</h2>
<h3 id="balance">0 UZS</h3>
</div>

<div class="box">

<h3>Balansni to‘ldirish</h3>

<input type="number" id="amount" placeholder="Summani kiriting">

<br>

<button onclick="pay()">To‘lov qilish</button>

</div>

<div class="box">

<h3>To‘lovlar tarixi</h3>

<ul id="history"></ul>

</div>

<script>

let balance = 0

function pay(){

let amount = document.getElementById("amount").value

if(amount <= 0){
alert("Summani kiriting")
return
}

openPayment(amount)

}

function openPayment(amount){

alert("Bu yerda Checkout yoki Payme ochiladi")

// keyin API orqali balans qo‘shiladi

addBalance(amount)

}

function addBalance(amount){

balance += Number(amount)

document.getElementById("balance").innerText = balance + " UZS"

let li = document.createElement("li")

li.innerText = amount + " UZS to‘landi"

document.getElementById("history").appendChild(li)

}

</script>

</body>
</html>
