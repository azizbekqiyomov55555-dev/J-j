<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balans tizimi</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.box{
background:#1e293b;
padding:20px;
margin:20px auto;
width:300px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:8px;
width:80%;
margin:10px;
}
</style>

</head>
<body>

<h1>💰 Balans tizimi</h1>

<div class="box">
<h2>Balans</h2>
<h3 id="balance">0 UZS</h3>
</div>

<div class="box">
<h2>Balansni to‘ldirish</h2>

<input type="number" id="amount" placeholder="Summani kiriting">

<br>

<button onclick="addBalance()">To‘ldirish</button>
</div>

<div class="box">
<h2>To‘lovlar tarixi</h2>
<ul id="history"></ul>
</div>

<script>

let balance = 0
let history = []

function addBalance(){

let amount = document.getElementById("amount").value

if(amount <= 0){
alert("Summani kiriting")
return
}

balance += Number(amount)

history.push(amount + " UZS qo‘shildi")

document.getElementById("balance").innerText = balance + " UZS"

showHistory()

}

function showHistory(){

let list = document.getElementById("history")

list.innerHTML = ""

history.forEach(function(item){

let li = document.createElement("li")

li.innerText = item

list.appendChild(li)

})

}

</script>

</body>
</html>
