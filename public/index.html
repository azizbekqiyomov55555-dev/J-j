<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balans to‘ldirish</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.box{
background:#1e293b;
padding:20px;
margin:20px auto;
width:320px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
margin:5px;
}

input{
padding:8px;
width:80%;
margin:10px;
}
</style>
</head>

<body>

<h2>💰 Balans tizimi</h2>

<div class="box">
Balans: <span id="balance">0</span> UZS
</div>

<div class="box">

<input type="number" id="amount" placeholder="Summani kiriting">

<br>

<button onclick="pay()">To‘ldirish</button>

</div>

<script>

async function loadBalance(){

let res = await fetch("/balance/1")
let data = await res.json()

document.getElementById("balance").innerText = data.balance

}

async function pay(){

let amount = document.getElementById("amount").value

let res = await fetch("/create-payment",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
amount:amount,
user:"1"
})

})

let data = await res.json()

/* foydalanuvchini to‘lov sahifasiga yuboradi */
window.location = data.payment_url

}

loadBalance()

</script>

</body>
</html>
